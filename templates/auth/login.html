{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-banner card" style="background-image:url('{{ url_for('static', filename='images/backgrounds/background_blur_showroom.png') }}')">
    <h1>Вход в личный кабинет</h1>
    <p>Управляйте заявками и записью на сервис.</p>
  </div>

  <form method="post" class="card auth-form">
    <h2>Авторизация</h2>
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Пароль
      <input type="password" name="password" required>
    </label>
    <button type="submit" class="btn btn-primary full">Войти</button>
    <p class="small-note">Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрируйтесь</a>.</p>
  </form>
</section>
{% endblock %}
