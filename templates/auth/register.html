{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-banner card" style="background-image:url('{{ url_for('static', filename='images/backgrounds/background_blur_showroom.png') }}')">
    <h1>Регистрация</h1>
    <p>Создайте аккаунт для управления заявками и профилем.</p>
  </div>

  <form method="post" class="card auth-form">
    <h2>Новый аккаунт</h2>
    <label>Имя <input name="first_name" required></label>
    <label>Фамилия <input name="last_name" required></label>
    <label>Отчество <input name="middle_name" required></label>
    <label>Телефон <input name="phone" placeholder="+79991234567" required></label>
    <label>Email <input type="email" name="email" required></label>
    <label>Пароль <input type="password" name="password" required></label>
    <label>Подтверждение пароля <input type="password" name="password_confirm" required></label>
    <button type="submit" class="btn btn-primary full">Зарегистрироваться</button>
  </form>
</section>
{% endblock %}
