{% extends 'base.html' %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<section class="card form-wrap">
  <h1>Смена пароля</h1>
  <form onsubmit="event.preventDefault(); sendPut(this, '{{ url_for('profile.change_password_put') }}', '{{ url_for('profile.profile') }}');">
    <label>Текущий пароль <input type="password" name="old_password" required></label>
    <label>Новый пароль <input type="password" name="new_password" required></label>
    <label>Подтверждение нового пароля <input type="password" name="confirm_password" required></label>
    <div class="row-gap">
      <button type="submit" class="btn btn-primary">Изменить пароль (PUT)</button>
      <a class="btn btn-secondary" href="{{ url_for('profile.profile') }}">Вернуться в кабинет</a>
    </div>
  </form>
</section>
{% endblock %}
